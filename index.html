<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Garbage Collection Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-box">
        <h2 id="status">Let's Clean Up!</h2>
        
        <div class="waste-container" id="waste-bin">
        <div class="item" draggable="true" id="p1">🧴 Plastic Bottle</div>
        <div class="item" draggable="true" id="p2">📄 Paper</div>
        <div class="item" draggable="true" id="p3">🧪 Glass Bottle</div>
        <div class="item" draggable="true" id="p4">🥫 Metal Can</div>
        </div>

        <div class="main-trash" id="main-trash">   
            🗑️ Trash Can
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
